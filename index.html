<!DOCTYPE html>
<html lang="en">
<head>
  <script defer src="/_vercel/insights/script.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> Quynh - Product Experience Designer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sidebar-bg: #160b03;
    --sidebar-text: #E8E3D9;
    --sidebar-muted: rgba(232,227,217,0.45);
    --sidebar-hover: rgba(255,255,255,0.07);
    --sidebar-active: rgba(255,255,255,0.12);
    --main-bg: #fff9f1;
    --text-primary: #1A1915;
    --text-muted: #6B6760;
    --text-hint: #9B9690;
    --border: rgba(0,0,0,0.09);
    --user-bubble: #f3ead8;
    --card-bg: #fffbf6;
    --tag-bg: rgba(0,0,0,0.06);
    --accent-orange: #c26400;
    --accent-pink: #C85B8A;
  }

  html {
    height: 100%;
    font-size: 16px;
  }

  /* ── Desktop background ── */
  body {
    height: 100%;
    font-family: 'DM Sans', system-ui, sans-serif;
    color: var(--text-primary);
    font-size: 16px;
    line-height: 1.5;
    overflow: hidden;
    background:
      radial-gradient(ellipse at 15% 60%, rgba(190,110,40,0.32) 0%, transparent 50%),
      radial-gradient(ellipse at 85% 15%, rgba(90,70,170,0.28) 0%, transparent 48%),
      radial-gradient(ellipse at 65% 85%, rgba(40,110,160,0.22) 0%, transparent 48%),
      linear-gradient(145deg, #150e20 0%, #0b1628 45%, #111a0c 100%);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
    background-size: 44px 44px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── Window chrome ── */
  .window-wrapper {
    position: relative;
    z-index: 1;
    width: min(1272px, 96vw);
    height: min(864px, 93vh);
    display: flex;
    flex-direction: column;
    border-radius: 12px;
    overflow: hidden;
    box-shadow:
      0 0 0 0.5px rgba(255,255,255,0.1),
      0 32px 90px rgba(0,0,0,0.75),
      0 8px 28px rgba(0,0,0,0.5);
  }

  /* Desktop: uniform scale so frame dimensions + internal spacing grow together */
  @media (min-width: 701px) {
    .window-wrapper {
      --frame-zoom: 1.125;
      width: min(1272px, calc(96vw / var(--frame-zoom)));
      height: min(864px, calc(93vh / var(--frame-zoom)));
      zoom: var(--frame-zoom);
    }
  }

  /* ── macOS titlebar ── */
  .titlebar {
    height: 40px;
    min-height: 40px;
    background: #222220;
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 8px;
    position: relative;
    user-select: none;
    flex-shrink: 0;
    border-bottom: 0.5px solid rgba(255,255,255,0.07);
    cursor: default;
  }

  .traffic-lights { display: flex; gap: 8px; align-items: center; }

  .tl {
    width: 12px; height: 12px;
    border-radius: 50%;
    cursor: pointer;
    transition: filter 0.12s;
  }
  .tl:hover { filter: brightness(1.15); }
  .tl.close { background: #FF5F57; border: 0.5px solid rgba(0,0,0,0.18); }
  .tl.min   { background: #FEBC2E; border: 0.5px solid rgba(0,0,0,0.18); }
  .tl.max   { background: #28C840; border: 0.5px solid rgba(0,0,0,0.18); }

  .titlebar-title {
    position: absolute;
    left: 50%; transform: translateX(-50%);
    font-size: 14px;
    font-weight: 500;
    color: rgba(232,227,217,0.45);
    pointer-events: none;
    white-space: nowrap;
  }

  /* ── Layout ── */
  .app {
    display: flex;
    flex: 1;
    overflow: hidden;
    min-height: 0;
    width: 100%;
    min-width: 0;
  }

  .window-wrapper.sidebar-collapsed .sidebar {
    width: 0;
    min-width: 0;
    opacity: 0;
    border-right: 0;
  }

  .window-wrapper.sidebar-collapsed .collapsed-rail {
    width: 56px;
    min-width: 56px;
    opacity: 1;
    pointer-events: auto;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 240px;
    min-width: 240px;
    background: linear-gradient(135deg, #1d0f04 0%, #2e0227 100%);;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    height: 100%;
    transition: width 0.2s ease, min-width 0.2s ease, opacity 0.18s ease;
  }

  .sidebar-header {
    padding: 16px;
    border-bottom: 0.5px solid rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .workspace-name {
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 0;
  }

  .workspace-identity {
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-width: 0;
  }

  .workspace-title {
    font-size: 16px;
    font-weight: 500;
    color: var(--sidebar-text);
    line-height: 1.2;
  }

  .workspace-subtitle {
    font-size: 12px;
    color: var(--sidebar-muted);
    line-height: 1.35;
  }

  .logo-orb {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, #D4730A 0%, #C85B8A 100%);
    flex-shrink: 0;
    overflow: hidden;
  }

  .avatar-img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
    object-position: center;
    display: block;
  }

  .logo-orb .avatar-img {
    transform: scale(1.25);
    transform-origin: center center;
  }

  .sidebar-section {
    padding: 16px 0 8px;
    flex: 1;
    overflow-y: auto;
  }

  .sidebar-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--sidebar-muted);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    padding: 0 16px 8px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    min-height: 40px;
    font-size: 14px;
    color: var(--sidebar-muted);
    cursor: pointer;
    transition: background 0.12s, color 0.12s;
    border-radius: 0;
    user-select: none;
  }
  .nav-item:hover { background: var(--sidebar-hover); color: var(--sidebar-text); }
  .nav-item.active { background: var(--sidebar-active); color: var(--sidebar-text); }

  .nav-dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: rgba(232,227,217,0.3);
    flex-shrink: 0;
  }
  .nav-item.active .nav-dot { background: #D4730A; }

  .sidebar-apps {
    padding: 8px 0 16px;
    border-top: 0.5px solid rgba(255,255,255,0.07);
  }

  .sidebar-header-toggle {
    width: 24px;
    height: 24px;
    border: none;
    border-radius: 8px;
    background: transparent;
    color: var(--sidebar-muted);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.12s ease, color 0.12s ease;
  }
  .sidebar-header-toggle:hover {
    background: var(--sidebar-hover);
    color: var(--sidebar-text);
  }

  .collapsed-rail {
    width: 0;
    min-width: 0;
    opacity: 0;
    pointer-events: none;
    background: var(--sidebar-bg);
    border-right: 0.5px solid rgba(255,255,255,0.08);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    padding: 16px 0 8px;
    transition: width 0.2s ease, min-width 0.2s ease, opacity 0.18s ease;
    overflow: hidden;
  }

  .rail-toggle {
    width: 32px;
    height: 32px;
    border: none;
    border-radius: 8px;
    background: transparent;
    color: var(--sidebar-muted);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.12s ease, color 0.12s ease;
    margin-bottom: 8px;
  }
  .rail-toggle:hover {
    background: var(--sidebar-hover);
    color: var(--sidebar-text);
  }

  .rail-item {
    width: 40px;
    height: 40px;
    border: none;
    border-radius: 12px;
    background: transparent;
    color: var(--sidebar-muted);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    padding: 8px;
    min-height: 40px;
    box-sizing: border-box;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.02em;
    transition: background 0.12s ease, color 0.12s ease;
  }
  .rail-item:hover {
    background: var(--sidebar-hover);
    color: var(--sidebar-text);
  }
  .rail-item.active {
    background: var(--sidebar-active);
    color: var(--sidebar-text);
  }

  /* ── Main chat area ── */
  .main {
    flex: 1;
    min-width: 0;
    min-height: 0;
    display: flex;
    flex-direction: column;
    background: var(--main-bg);
    overflow: visible;
  }

  /* ── Case study takeover ── */
  .case-view {
    display: flex;
    flex-direction: column;
    flex: 1;
    height: 100%;
    min-height: 0;
    background: var(--main-bg);
    overflow: hidden;
  }

  .case-view[hidden] {
    display: none !important;
  }

  .cv-topbar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 24px;
    border-bottom: 0.5px solid var(--border);
    background: var(--main-bg);
    flex-shrink: 0;
  }

  .cv-tab {
    padding: 8px 16px;
    min-height: 40px;
    font-size: 14px;
  }

  .cv-back {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 16px;
    color: var(--text-muted);
    background: none;
    border: none;
    cursor: pointer;
    padding: 8px 0;
    min-height: 40px;
    white-space: nowrap;
    font-family: 'DM Sans', sans-serif;
    transition: color 0.12s;
  }

  .cv-back:hover {
    color: var(--text-primary);
  }

  .cv-title {
    font-size: 16px;
    font-weight: 500;
    color: var(--text-primary);
    flex: 1;
    min-width: 0;
  }

  .cv-content {
    flex: 1;
    overflow-y: auto;
    min-height: 0;
    padding: 32px 32px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .cv-placeholder {
    background: #F0EDE8;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    color: var(--text-hint);
  }

  .cv-hero {
    width: 100%;
  }

  .cv-hero:has(> img) {
    padding: 0;
    display: block;
    background: transparent;
  }

  .cv-thumbs {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    align-items: start;
  }

  .cv-thumbs .cv-placeholder {
    min-width: 0;
  }

  .cv-thumbs .cv-placeholder:has(> img) {
    padding: 0;
    display: block;
    background: transparent;
  }

  .cv-flow-large {
    width: 100%;
  }

  .cv-flow-large:has(> img) {
    padding: 0;
    display: block;
    background: transparent;
  }

  .case-view .cv-content img {
    width: 100%;
    height: auto;
    display: block;
  }

  .cv-annotation {
    background: white;
    border: 0.5px solid var(--border);
    border-left: 3px solid #D4730A;
    border-radius: 0 8px 8px 0;
    padding: 16px;
  }

  .cv-annotation-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-hint);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 4px;
  }

  .cv-annotation-body {
    font-size: 16px;
    color: var(--text-primary);
    line-height: 1.6;
  }

  .cv-section {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .cv-section-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-hint);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .cv-section-text {
    font-size: 16px;
    color: var(--text-primary);
    line-height: 1.65;
  }

  .cv-section-text ul {
    margin: 0;
    padding-left: 16px;
  }

  .cv-section-text li {
    margin-bottom: 4px;
  }

  .cv-stat-row {
    display: flex;
    align-items: flex-start;
    gap: 24px;
    padding-bottom: 16px;
    margin-bottom: 8px;
    border-bottom: 0.5px solid var(--border);
  }

  .cv-stat-num,
  .cv-stat-number {
    font-size: 36px;
    font-weight: 500;
    line-height: 1;
    color: var(--text-primary);
  }

  .cv-stat-label {
    font-size: 12px;
    color: var(--text-hint);
    margin-top: 4px;
  }

  .cv-stat-desc {
    font-size: 16px;
    color: var(--text-muted);
    line-height: 1.55;
    flex: 1;
    min-width: 0;
  }

  .cv-meta {
    display: flex;
    flex-direction: column;
    gap: 24px;
    padding: 8px 0;
  }

  .cv-meta-item {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .cv-meta-key {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-hint);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .cv-meta-val {
    font-size: 16px;
    color: var(--text-primary);
    line-height: 1.55;
  }

  .cv-section-body {
    font-size: 16px;
    color: var(--text-primary);
    line-height: 1.65;
  }

  .cv-section-body ul {
    margin: 0;
    padding-left: 16px;
  }

  .cv-section-body li {
    margin-bottom: 4px;
  }

  .cv-highlights {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }

  .cv-highlight-card {
    background: white;
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .cv-highlight-number {
    font-size: 28px;
    font-weight: 500;
    color: var(--text-primary);
    line-height: 1;
  }

  .cv-highlight-label {
    font-size: 12px;
    color: var(--text-hint);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .cv-pillar-text {
    font-size: 16px;
    font-weight: 400;
    color: var(--text-primary);
    line-height: 1.45;
  }

  .cv-reactions-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-hint);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .cv-reactions {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 24px 0 8px;
    border-top: 0.5px solid var(--border);
    margin-top: 8px;
  }

  .cv-reactions-pills {
    display: flex;
    align-items: center;
    flex-wrap: nowrap;
    gap: 8px;
    width: 100%;
  }

  .cv-back-to-chat-btn {
    margin-left: auto;
    flex-shrink: 0;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-muted);
    background: transparent;
    border: 0.5px solid var(--border);
    border-radius: 8px;
    padding: 8px 16px;
    min-height: 40px;
    cursor: pointer;
    transition: background 0.12s ease, border-color 0.12s ease, color 0.12s ease;
  }

  .cv-back-to-chat-btn:hover {
    background: #F3F0EB;
    border-color: rgba(0, 0, 0, 0.14);
    color: var(--text-primary);
  }

  .cv-reaction-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: white;
    border: 0.5px solid rgba(0, 0, 0, 0.12);
    border-radius: 24px;
    padding: 8px 16px;
    min-height: 40px;
    font-size: 16px;
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s, transform 0.1s;
    font-family: 'DM Sans', sans-serif;
  }

  .cv-reaction-btn:hover {
    background: #F5F3EF;
    border-color: rgba(0, 0, 0, 0.2);
  }

  .cv-reaction-btn.reacted {
    background: #FDF6EE;
    border-color: #D4730A;
  }

  .cv-reaction-btn.reacted .cv-reaction-count {
    color: #D4730A;
    font-weight: 500;
  }

  .cv-reaction-count {
    font-size: 14px;
    color: var(--text-muted);
    min-width: 8px;
  }

  .cv-footer {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 16px;
    padding: 16px 24px;
    border-top: 0.5px solid var(--border);
    background: var(--main-bg);
  }

  .cv-footer-inner {
    display: flex;
    flex-direction: row;
    align-items: stretch;
    justify-content: space-between;
    gap: 16px;
    width: 100%;
  }

  .cv-nav-spacer {
    flex: 1;
    min-width: 0;
  }

  .cv-nav-btn {
    font-family: 'DM Sans', sans-serif;
    padding: 8px 16px;
    min-height: 40px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    flex: 0 1 auto;
    max-width: min(280px, 46%);
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 2px;
    border: 0.5px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    text-align: left;
    transition: background 0.12s ease, border-color 0.12s ease, color 0.12s ease;
    box-sizing: border-box;
  }

  .cv-nav-btn.cv-nav-next {
    align-items: flex-end;
  }

  .cv-nav-btn:hover {
    background: #F3F0EB;
    border-color: rgba(0, 0, 0, 0.14);
    color: var(--text-primary);
  }

  .cv-nav-btn:hover .cv-nav-label,
  .cv-nav-btn:hover .cv-nav-title {
    color: var(--text-primary);
  }

  .cv-nav-label {
    font-size: 10px;
    font-weight: 500;
    color: var(--text-hint);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .cv-nav-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    line-height: 1.35;
  }

  @media (max-width: 767px) {
    #suggestions-area {
      padding: 0 0 16px;
    }

    .messages {
      padding: 24px 16px;
    }

    .cv-content {
      padding: 24px 16px;
    }

    .cv-topbar {
      padding: 16px;
    }

    .cv-nav-btn {
      padding: 8px 12px;
      min-height: 40px;
      font-size: 12px;
      max-width: min(260px, 48%);
    }

    .cv-nav-label {
      font-size: 9px;
    }

    .cv-nav-title {
      font-size: 12px;
    }

    .cv-footer {
      padding: 16px;
      gap: 8px;
    }

    .suggestions-list {
      flex-direction: column;
      width: 100%;
    }

    .suggestion-btn {
      width: 100%;
      justify-content: flex-start;
      padding: 16px;
      min-height: 48px;
      font-size: 14px;
    }

    .cv-highlights {
      grid-template-columns: repeat(2, 1fr);
    }

    .logo-orb {
      width: 36px;
      height: 36px;
    }

    .sender-orb {
      width: 20px;
      height: 20px;
    }
  }

  .topbar {
    padding: 16px 24px;
    border-bottom: 0.5px solid var(--border);
    font-size: 16px;
    font-weight: 500;
    color: var(--text-primary);
    background: var(--main-bg);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .vp-topbar-title {
    font-size: 16px;
  }

  .sidebar-toggle {
    width: 32px;
    height: 32px;
    border: 0.5px solid rgba(0,0,0,0.14);
    border-radius: 8px;
    background: #fff;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--text-muted);
    transition: background 0.12s ease, border-color 0.12s ease;
  }
  .sidebar-toggle:hover {
    background: #F3F0EB;
    border-color: rgba(0,0,0,0.22);
  }

  .desktop-only { display: inline-flex; }
  .mobile-only { display: none; }

  .sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.32);
    z-index: 19;
  }

  /* ── Messages ── */
  .messages {
    flex: 1;
    min-width: 0;
    overflow-x: hidden;
    overflow-y: visible;
    padding: 32px 24px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    scroll-behavior: smooth;
    word-break: break-word;
    overflow-wrap: break-word;
  }

  .msg-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-width: 0;
    width: 100%;
    animation: fadeUp 0.28s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg-sender {

  .msg-reaction-btn.msg-reaction-active {
    background: rgba(212, 115, 10, 0.12);
    border-color: rgba(212, 115, 10, 0.35);

  .msg-reaction-count {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    min-width: 0.5ch;
  }

  .msg-reaction-btn.msg-reaction-active .msg-reaction-count {
    color: #D4730A;
  }

  /* system-style “You viewed …” separator (chat timeline) */
  .msg-viewed-divider-group {
    align-items: center;
  }

  .msg-viewed-divider {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    max-width: 100%;
    padding: 2px 0;

  .msg-viewed-divider-line {
    flex: 1;

    background: rgba(107, 103, 96, 0.22);

  .msg-viewed-divider-text {
    flex-shrink: 0;

    font-weight: 500;

  /* user bubble */
  .user-row { display: flex; justify-content: flex-end; }

    background: var(--user-bubble);

  /* typing indicator */
  .typing {
    display: flex; align-items: center; gap: 8px;

  .typing span {

  .typing span:nth-child(2) { animation-delay: 0.18s; }
  .typing span:nth-child(3) { animation-delay: 0.36s; }
  @keyframes blink { 0%,80%,100%{opacity:0.25} 40%{opacity:1} }

  /* ── Tags & pills ── */
  .tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }

  .option-pills {
    display: flex;
    flex-wrap: wrap;

    border-radius: 4px;

  /* ── Main inner (chat + suggestions) ── */
  .main-inner {
    position: relative;
    flex: 1;
    min-height: 0;

    overflow-y: auto;

    position: relative;

    opacity: 0;
    visibility: hidden;
    padding: 0 8px 24px;
    box-sizing: border-box;
  }

  #suggestions-area.is-visible {
    pointer-events: auto;

  #suggestions-area.is-visible .suggestions-inner {

  #suggestions-area.is-visible .suggestions-header {

  #suggestions-area.is-hiding {

    pointer-events: none;
    transition: opacity 0.15s ease;
    visibility: visible;
  }

  @keyframes floatIn {
    0%   { opacity: 0; transform: translateY(12px); }

  /* ── Contact ── */
  .contact-block {

</style>

<script>
const messages = document.getElementById('messages');
const suggestionsEl = document.getElementById('suggestions-area');
const mainInner = document.getElementById('main-inner');
const caseViewEl = document.getElementById('case-view');
const cvContentEl = document.getElementById('cv-content');
const cvFooterEl = document.getElementById('cv-footer');
const cvTitleEl = document.getElementById('cv-title');
let suggestionsHideTimer = null;
let currentCaseId = null;
const reactionCounts = {};

function cvReactionCountKey(caseId, emojiSlug) {
  return `reactions-${caseId}-${emojiSlug}`;
}
function cvReactedKey(caseId, emojiSlug) {
  return `reacted-${caseId}-${emojiSlug}`;
}
function getCvReactionCount(caseId, emojiSlug) {
  try {
    const raw = localStorage.getItem(cvReactionCountKey(caseId, emojiSlug));
    const n = parseInt(raw, 10);
    return Number.isFinite(n) && n >= 0 ? n : 0;
  } catch (e) {
    return 0;
  }
}
function setCvReactionCount(caseId, emojiSlug, count) {
  try {
    localStorage.setItem(cvReactionCountKey(caseId, emojiSlug), String(count));
  } catch (e) { /* quota / private mode */ }
}
function hasCvUserReacted(caseId, emojiSlug) {
  try {
    return localStorage.getItem(cvReactedKey(caseId, emojiSlug)) === '1';
  } catch (e) {
    return false;
  }
}
function setCvUserReacted(caseId, emojiSlug) {
  try {
    localStorage.setItem(cvReactedKey(caseId, emojiSlug), '1');
  } catch (e) { /* quota / private mode */ }
}

function clearSuggestionsImmediate() {
  if (suggestionsHideTimer) {
    clearTimeout(suggestionsHideTimer);
    suggestionsHideTimer = null;
  }
  suggestionsEl.classList.remove('is-visible', 'is-hiding');
  suggestionsEl.innerHTML = '';
}

function buildCvOverviewHtml(c) {
  const contextPillars = c.contextPillars || [
    { label: 'Team', value: c.team },
    { label: 'Role', value: c.role },
    { label: 'Constraints', value: c.constraints }
  ];
  const pillarsHtml = contextPillars.map(p => `
      <div class="cv-highlight-card">
        <div class="cv-highlight-label">${p.label}</div>
        <div class="cv-pillar-text">${p.value}</div>
      </div>`).join('');

  const heroInner = c.heroImage
    ? `<img src="${c.heroImage}" alt="">`
    : `[ Hero screen — ${c.title} ]`;

  const thumbsInner = c.thumbImages
    ? c.thumbImages.map(src => `<div class="cv-placeholder"><img src="${src}" alt=""></div>`).join('')
    : `<div class="cv-placeholder">[ Screen 2 ]</div>
      <div class="cv-placeholder">[ Screen 3 ]</div>
      <div class="cv-placeholder">[ Screen 4 ]</div>`;

  const flowInner = c.flowImage
    ? `<img src="${c.flowImage}" alt="">`
    : `[ User flow / IA diagram — ${c.title} ]`;

  const revisedFlowInner = c.revisedFlowImage
    ? `<img src="${c.revisedFlowImage}" alt="">`
    : `[ User flow / IA diagram — ${c.title} ]`;

  const isFeedProfile = c.title === 'Feed Profile Creation';
  const isSportsHomepage = currentCaseId === 'sports-homepage';
  const decisionsSectionLabel = c.decisionsSectionLabel || 'Design trade-offs';

  const proposedFlowSection = `    <div class="cv-section">
      <div class="cv-section-label">Proposed flow - Rejected</div>
      <div class="cv-section-body">
        <div class="cv-placeholder cv-flow-large">
          ${flowInner}
        </div>
      </div>
    </div>`;

  const revisedFlowSection = `    <div class="cv-section">
      <div class="cv-section-label">Revised Flow</div>
      <div class="cv-section-body">
        <div class="cv-placeholder cv-flow-large">
          ${revisedFlowInner}
        </div>
      </div>
    </div>`;

  const flowBlockSimple = `    <div class="cv-placeholder cv-flow-large">
      ${flowInner}
    </div>`;

  const contextualBetslipSection = `    <div class="cv-section">
      <div class="cv-section-label">Contextual betslip</div>
      <div class="cv-section-body">
        <div class="cv-placeholder cv-flow-large">
          <img src="assets/flow-sports-homepage-2.png" alt="">
        </div>
      </div>
    </div>`;

  const thumbsBlock = `
    <div class="cv-thumbs">
      ${thumbsInner}
    </div>`;

  const tldrSection = `    <div class="cv-section">
      <div class="cv-section-label">TL;DR</div>
      <div class="cv-section-body">
        <ul>
          <li>Problem: ${c.problem}</li>
          <li>Action: ${c.action}</li>
          <li>Outcome: ${c.outcome}</li>
        </ul>
      </div>
    </div>`;

  const heroBlock = `    <div class="cv-placeholder cv-hero">${heroInner}</div>`;

  return `
${isFeedProfile ? `${heroBlock}

${tldrSection}` : `${tldrSection}

${heroBlock}`}

    <div class="cv-highlights">
      ${pillarsHtml}
    </div>
${isFeedProfile ? thumbsBlock : ''}
    <div class="cv-section">
      <div class="cv-section-label">Insights</div>
      <div class="cv-section-body">
        <ul>
          ${c.insights.map(i => {
            if (i && typeof i === 'object' && Array.isArray(i.points)) {
              const nested = `<ul>${i.points.map(p => `<li>${p}</li>`).join('')}</ul>`;
              return `<li>${i.text}${nested}</li>`;
            }
            return `<li>${i}</li>`;
          }).join('')}
        </ul>
      </div>
    </div>
${!isFeedProfile ? thumbsBlock : ''}
${isFeedProfile ? proposedFlowSection : ''}
    <div class="cv-section">
      <div class="cv-section-label">${decisionsSectionLabel}</div>
      <div class="cv-section-body">
        <ul>
          ${c.decisions.map(d => `<li>${d}</li>`).join('')}
        </ul>
      </div>
    </div>

    ${isFeedProfile ? revisedFlowSection : flowBlockSimple}
${isSportsHomepage ? contextualBetslipSection : ''}

    <div class="cv-section">
      <div class="cv-section-label">Reflection</div>
      <div class="cv-section-body">${c.reflection}</div>
    </div>

    <div class="cv-reactions">
      <div class="cv-reactions-pills">
        <button class="cv-reaction-btn${hasCvUserReacted(currentCaseId, 'fire') ? ' reacted' : ''}" data-reaction="fire"
                onclick="handleReaction(this, 'fire')">
          🔥 <span class="cv-reaction-count">${getCvReactionCount(currentCaseId, 'fire')}</span>
        </button>
        <button class="cv-reaction-btn${hasCvUserReacted(currentCaseId, 'heart') ? ' reacted' : ''}" data-reaction="heart"
                onclick="handleReaction(this, 'heart')">
          ❤️ <span class="cv-reaction-count">${getCvReactionCount(currentCaseId, 'heart')}</span>
        </button>
        <button class="cv-reaction-btn${hasCvUserReacted(currentCaseId, 'bulb') ? ' reacted' : ''}" data-reaction="bulb"
                onclick="handleReaction(this, 'bulb')">
          💡 <span class="cv-reaction-count">${getCvReactionCount(currentCaseId, 'bulb')}</span>
        </button>
        <button type="button" class="cv-back-to-chat-btn"
                onclick="closeCaseView(true)">Back to chat</button>
      </div>
    </div>`;
}

function handleReaction(btn, type) {
  if (!currentCaseId) return;
  if (hasCvUserReacted(currentCaseId, type)) return;

  const countEl = btn.querySelector('.cv-reaction-count');
  const next = getCvReactionCount(currentCaseId, type) + 1;
  setCvReactionCount(currentCaseId, type, next);
  setCvUserReacted(currentCaseId, type);
  btn.classList.add('reacted');
  if (countEl) countEl.textContent = next;
}

function renderCaseViewTab() {
  if (!currentCaseId) return;
  const c = caseData[currentCaseId];
  if (!c) return;
  cvContentEl.innerHTML = buildCvOverviewHtml(c);
  cvContentEl.scrollTop = 0;
}

function populateCaseFooter(activeId) {
  const ids = Object.keys(caseData);
  const idx = ids.indexOf(activeId);
  const prevId = idx > 0 ? ids[idx - 1] : null;
  const nextId = idx >= 0 && idx < ids.length - 1 ? ids[idx + 1] : null;
  const esc = (s) => String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
  const prevSlot = prevId
    ? `<button type="button" class="cv-nav-btn cv-nav-prev" data-case-id="${prevId}"
        onclick="window.va && window.va('event', { name: 'case_study_click', data: { study: '${caseStudyClickAnalyticsName[prevId]}' } })">
        <span class="cv-nav-label">Previous</span>
        <span class="cv-nav-title">${esc(caseData[prevId].title)}</span>
      </button>`
    : '<div class="cv-nav-spacer" aria-hidden="true"></div>';
  const nextSlot = nextId
    ? `<button type="button" class="cv-nav-btn cv-nav-next" data-case-id="${nextId}"
        onclick="window.va && window.va('event', { name: 'case_study_click', data: { study: '${caseStudyClickAnalyticsName[nextId]}' } })">
        <span class="cv-nav-label">Next</span>
        <span class="cv-nav-title">${esc(caseData[nextId].title)}</span>
      </button>`
    : '<div class="cv-nav-spacer" aria-hidden="true"></div>';
  cvFooterEl.innerHTML = `
    <div class="cv-footer-inner">
      ${prevSlot}
      ${nextSlot}
    </div>`;
  cvFooterEl.querySelectorAll('[data-case-id]').forEach(btn => {
    btn.addEventListener('click', () => openCaseView(btn.getAttribute('data-case-id')));
  });
}

function openCaseView(id) {
  const c = caseData[id];
  if (!c) return;
  if (currentCaseId != null && currentCaseId !== id) {
    const prev = caseData[currentCaseId];
    if (prev) appendViewedCaseDivider(prev.title);
  }
  viewedCases.add(id);
  currentCaseId = id;
  cvTitleEl.textContent = c.title;
  populateCaseFooter(id);
  renderCaseViewTab();
  caseViewEl.hidden = false;
  mainInner.hidden = true;
}

function escapeChatFollowupText(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function buildCaseCloseFollowupHtml(closedCaseId) {
  const spec = caseCloseFollowupById[closedCaseId];
  if (!spec) return null;
  const blockId = 'cfu-' + Date.now() + '-' + Math.random().toString(36).slice(2, 9);
  const esc = escapeChatFollowupText(spec.text);
  const reactions = spec.emojis.map((emoji, i) =>
    `<button type="button" class="msg-reaction-btn" data-cfu="${blockId}" data-ri="${i}" onclick="handleChatFollowupReaction(this)">${emoji} <span class="msg-reaction-count">0</span></button>`
  ).join('');
  return `${esc}<div class="msg-followup-reactions">${reactions}</div>`;
}

function handleChatFollowupReaction(btn) {
  const blockId = btn.getAttribute('data-cfu');
  const ri = btn.getAttribute('data-ri');
  if (blockId == null || ri == null) return;
  const key = blockId + '-' + ri;
  const countEl = btn.querySelector('.msg-reaction-count');
  if (btn.classList.contains('msg-reaction-active')) {
    reactionCounts[key] = Math.max(0, (reactionCounts[key] || 0) - 1);
    btn.classList.remove('msg-reaction-active');
    if (countEl) countEl.textContent = reactionCounts[key];
  } else {
    reactionCounts[key] = (reactionCounts[key] || 0) + 1;
    btn.classList.add('msg-reaction-active');
    if (countEl) countEl.textContent = reactionCounts[key];
  }
}

function closeCaseView(showSuggestionsAfter) {
  const closedCaseId = currentCaseId;
  currentCaseId = null;
  caseViewEl.hidden = true;
  mainInner.hidden = false;
  cvFooterEl.innerHTML = '';
  if (!showSuggestionsAfter) return;
  const followupHtml = closedCaseId ? buildCaseCloseFollowupHtml(closedCaseId) : null;
  const messagesEl = document.getElementById('messages');
  mainInner.scrollTop = mainInner.scrollHeight;
  if (!followupHtml) {
    scroll();
    return;
  }
  if (closedCaseId && caseData[closedCaseId]) {
    appendViewedCaseDivider(caseData[closedCaseId].title);
  }
  addTyping();
  setTimeout(() => {
    removeTyping();
    addClaudeMsg(followupHtml);
    scroll();
  }, 900);
}

function setActiveNav(key) {

function toggleDesktopSidebar() {
  if (mobileQuery.matches) return;
  windowWrapper.classList.toggle('sidebar-collapsed');
}

function toggleMobileSidebar() {
  if (!mobileQuery.matches) return;
  windowWrapper.classList.toggle('sidebar-open');
}

function closeSidebarOnMobile() {
  if (!mobileQuery.matches) return;
  windowWrapper.classList.remove('sidebar-open');
}

mobileQuery.addEventListener('change', e => {
  if (!e.matches) {
    windowWrapper.classList.remove('sidebar-open');
  }
});

function addOptions(pills, headerText) {
  clearSuggestionsImmediate();
  const header = headerText === undefined || headerText === null ? 'Suggested' : headerText;
  const headerHtml = `<div class="suggestions-header">${header.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</div>`;
  const buttonsHtml = pills.map((p, i) =>
    `<button type="button" class="suggestion-btn" onclick="handleOption('${p.key}')"><span class="suggestion-num" aria-hidden="true">${i + 1}</span><span class="suggestion-label">${p.label}</span></button>`
  ).join('');
  suggestionsEl.innerHTML = `<div class="suggestions-inner">${headerHtml}<div class="suggestions-list">${buttonsHtml}</div></div>`;
  suggestionsEl.classList.add('is-visible');
  scroll();
}

function removeOptions() {
  const o = document.getElementById('options');
  if (o) o.remove();
  if (!suggestionsEl.classList.contains('is-visible') || !suggestionsEl.innerHTML.trim()) {
    clearSuggestionsImmediate();
    return;
  }
  if (suggestionsHideTimer) {
    clearTimeout(suggestionsHideTimer);
    suggestionsHideTimer = null;
  }
  suggestionsEl.classList.add('is-hiding');
  suggestionsHideTimer = setTimeout(() => {
    suggestionsEl.innerHTML = '';
    suggestionsEl.classList.remove('is-visible', 'is-hiding');
    suggestionsHideTimer = null;
  }, 200);
}

function scroll() {
  setTimeout(() => { mainInner.scrollTop = mainInner.scrollHeight; }, 50);
}
