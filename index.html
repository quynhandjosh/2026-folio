<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> Quynh - Product Experience Designer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sidebar-bg: #1C1C1A;
    --sidebar-text: #E8E3D9;
    --sidebar-muted: rgba(232,227,217,0.45);
    --sidebar-hover: rgba(255,255,255,0.07);
    --sidebar-active: rgba(255,255,255,0.12);
    --main-bg: #FAF9F7;
    --text-primary: #1A1915;
    --text-muted: #6B6760;
    --text-hint: #9B9690;
    --border: rgba(0,0,0,0.09);
    --user-bubble: #ECEAE6;
    --card-bg: #FFFFFF;
    --tag-bg: rgba(0,0,0,0.06);
    --accent-orange: #D4730A;
    --accent-pink: #C85B8A;
  }

  html, body {
    height: 100%;
    font-family: 'DM Sans', system-ui, sans-serif;
    color: var(--text-primary);
    font-size: 18px;
    overflow: hidden;
  }

  /* ── Desktop background ── */
  body {
    background:
      radial-gradient(ellipse at 15% 60%, rgba(190,110,40,0.32) 0%, transparent 50%),
      radial-gradient(ellipse at 85% 15%, rgba(90,70,170,0.28) 0%, transparent 48%),
      radial-gradient(ellipse at 65% 85%, rgba(40,110,160,0.22) 0%, transparent 48%),
      linear-gradient(145deg, #150e20 0%, #0b1628 45%, #111a0c 100%);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
    background-size: 44px 44px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── Window chrome ── */
  .window-wrapper {
    position: relative;
    z-index: 1;
    width: min(1272px, 96vw);
    height: min(864px, 93vh);
    display: flex;
    flex-direction: column;
    border-radius: 12px;
    overflow: hidden;
    box-shadow:
      0 0 0 0.5px rgba(255,255,255,0.1),
      0 32px 90px rgba(0,0,0,0.75),
      0 8px 28px rgba(0,0,0,0.5);
  }

  /* ── macOS titlebar ── */
  .titlebar {
    height: 40px;
    min-height: 40px;
    background: #222220;
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 8px;
    position: relative;
    user-select: none;
    flex-shrink: 0;
    border-bottom: 0.5px solid rgba(255,255,255,0.07);
    cursor: default;
  }

  .traffic-lights { display: flex; gap: 7px; align-items: center; }

  .tl {
    width: 12px; height: 12px;
    border-radius: 50%;
    cursor: pointer;
    transition: filter 0.12s;
  }
  .tl:hover { filter: brightness(1.15); }
  .tl.close { background: #FF5F57; border: 0.5px solid rgba(0,0,0,0.18); }
  .tl.min   { background: #FEBC2E; border: 0.5px solid rgba(0,0,0,0.18); }
  .tl.max   { background: #28C840; border: 0.5px solid rgba(0,0,0,0.18); }

  .titlebar-title {
    position: absolute;
    left: 50%; transform: translateX(-50%);
    font-size: 14px;
    font-weight: 500;
    color: rgba(232,227,217,0.45);
    pointer-events: none;
    white-space: nowrap;
  }

  /* ── Layout ── */
  .app {
    display: flex;
    flex: 1;
    overflow: hidden;
    min-height: 0;
    width: 100%;
    min-width: 0;
  }

  .window-wrapper.sidebar-collapsed .sidebar {
    width: 0;
    min-width: 0;
    opacity: 0;
    border-right: 0;
  }

  .window-wrapper.sidebar-collapsed .collapsed-rail {
    width: 56px;
    min-width: 56px;
    opacity: 1;
    pointer-events: auto;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 240px;
    min-width: 240px;
    background: var(--sidebar-bg);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    height: 100%;
    transition: width 0.2s ease, min-width 0.2s ease, opacity 0.18s ease;
  }

  .sidebar-header {
    padding: 18px 16px 14px;
    border-bottom: 0.5px solid rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  .workspace-name {
    display: flex;
    align-items: center;
    gap: 9px;
    font-size: 16px;
    font-weight: 500;
    color: var(--sidebar-text);
    min-width: 0;
  }

  .logo-orb {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: linear-gradient(135deg, #D4730A 0%, #C85B8A 100%);
    flex-shrink: 0;
  }

  .sidebar-section {
    padding: 14px 0 4px;
    flex: 1;
    overflow-y: auto;
  }

  .sidebar-label {
    font-size: 13px;
    font-weight: 500;
    color: var(--sidebar-muted);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    padding: 0 16px 6px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 16px;
    font-size: 16px;
    color: var(--sidebar-muted);
    cursor: pointer;
    transition: background 0.12s, color 0.12s;
    border-radius: 0;
    user-select: none;
  }
  .nav-item:hover { background: var(--sidebar-hover); color: var(--sidebar-text); }
  .nav-item.active { background: var(--sidebar-active); color: var(--sidebar-text); }

  .nav-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: rgba(232,227,217,0.3);
    flex-shrink: 0;
  }
  .nav-item.active .nav-dot { background: #D4730A; }

  .sidebar-apps {
    padding: 10px 0 16px;
    border-top: 0.5px solid rgba(255,255,255,0.07);
  }

  .sidebar-header-toggle {
    width: 24px;
    height: 24px;
    border: none;
    border-radius: 6px;
    background: transparent;
    color: var(--sidebar-muted);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.12s ease, color 0.12s ease;
  }
  .sidebar-header-toggle:hover {
    background: var(--sidebar-hover);
    color: var(--sidebar-text);
  }

  .collapsed-rail {
    width: 0;
    min-width: 0;
    opacity: 0;
    pointer-events: none;
    background: var(--sidebar-bg);
    border-right: 0.5px solid rgba(255,255,255,0.08);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    padding: 14px 0 10px;
    transition: width 0.2s ease, min-width 0.2s ease, opacity 0.18s ease;
    overflow: hidden;
  }

  .rail-toggle {
    width: 28px;
    height: 28px;
    border: none;
    border-radius: 7px;
    background: transparent;
    color: var(--sidebar-muted);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.12s ease, color 0.12s ease;
    margin-bottom: 6px;
  }
  .rail-toggle:hover {
    background: var(--sidebar-hover);
    color: var(--sidebar-text);
  }

  .rail-item {
    width: 34px;
    height: 34px;
    border: none;
    border-radius: 10px;
    background: transparent;
    color: var(--sidebar-muted);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.02em;
    transition: background 0.12s ease, color 0.12s ease;
  }
  .rail-item:hover {
    background: var(--sidebar-hover);
    color: var(--sidebar-text);
  }
  .rail-item.active {
    background: var(--sidebar-active);
    color: var(--sidebar-text);
  }

  /* ── Main chat area ── */
  .main {
    flex: 1;
    min-width: 0;
    min-height: 0;
    display: flex;
    flex-direction: column;
    background: var(--main-bg);
    overflow: visible;
  }

  /* ── Case study takeover ── */
  .case-view {
    display: flex;
    flex-direction: column;
    flex: 1;
    height: 100%;
    min-height: 0;
    background: var(--main-bg);
    overflow: hidden;
  }

  .case-view[hidden] {
    display: none !important;
  }

  .cv-topbar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 12px 24px;
    border-bottom: 0.5px solid var(--border);
    background: var(--main-bg);
    flex-shrink: 0;
  }

  .cv-back {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--text-muted);
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 0;
    white-space: nowrap;
    font-family: 'DM Sans', sans-serif;
    transition: color 0.12s;
  }

  .cv-back:hover {
    color: var(--text-primary);
  }

  .cv-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
    flex: 1;
    min-width: 0;
  }

  .cv-tabs {
    display: flex;
    gap: 2px;
  }

  .cv-tab {
    padding: 5px 12px;
    font-size: 12.5px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text-muted);
    background: none;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.12s, color 0.12s;
  }

  .cv-tab:hover {
    background: rgba(0, 0, 0, 0.05);
    color: var(--text-primary);
  }

  .cv-tab.active {
    background: rgba(0, 0, 0, 0.07);
    color: var(--text-primary);
    font-weight: 500;
  }

  .cv-content {
    flex: 1;
    overflow-y: auto;
    min-height: 0;
    padding: 28px 32px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .cv-placeholder {
    background: #F0EDE8;
    border: 0.5px dashed rgba(0, 0, 0, 0.15);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    color: var(--text-hint);
  }

  .cv-hero {
    width: 100%;
    height: 260px;
  }

  .cv-thumbs {
    display: flex;
    gap: 10px;
  }

  .cv-thumbs .cv-placeholder {
    flex: 1;
    height: 90px;
    min-width: 0;
  }

  .cv-annotation {
    background: white;
    border: 0.5px solid var(--border);
    border-left: 3px solid #D4730A;
    border-radius: 0 8px 8px 0;
    padding: 12px 16px;
  }

  .cv-annotation-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-hint);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 4px;
  }

  .cv-annotation-body {
    font-size: 13px;
    color: var(--text-primary);
    line-height: 1.6;
  }

  .cv-section {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .cv-section-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-hint);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .cv-section-text {
    font-size: 15px;
    color: var(--text-primary);
    line-height: 1.65;
  }

  .cv-section-text ul {
    margin: 0;
    padding-left: 18px;
  }

  .cv-section-text li {
    margin-bottom: 4px;
  }

  .cv-stat-row {
    display: flex;
    align-items: flex-start;
    gap: 20px;
    padding-bottom: 16px;
    margin-bottom: 8px;
    border-bottom: 0.5px solid var(--border);
  }

  .cv-stat-num {
    font-size: 31px;
    font-weight: 500;
    line-height: 1;
    color: var(--text-primary);
  }

  .cv-stat-label {
    font-size: 13px;
    color: var(--text-hint);
    margin-top: 4px;
  }

  .cv-stat-desc {
    font-size: 16px;
    color: var(--text-muted);
    line-height: 1.55;
    flex: 1;
    min-width: 0;
  }

  .cv-flow-large {
    width: 100%;
    min-height: 280px;
  }

  .cv-footer {
    flex-shrink: 0;
    padding: 14px 24px 18px;
    border-top: 0.5px solid var(--border);
    background: var(--main-bg);
  }

  .cv-footer-inner {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .cv-footer-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-hint);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .cv-footer-links {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .cv-footer-btn {
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    padding: 8px 14px;
    border-radius: 8px;
    border: 0.5px solid var(--border);
    background: var(--card-bg);
    color: var(--text-primary);
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s;
  }

  .cv-footer-btn:hover {
    background: #F3F0EB;
    border-color: rgba(0, 0, 0, 0.14);
  }

  @media (max-width: 767px) {
    .suggestions-list {
      flex-direction: column;
      width: 100%;
    }

    .suggestion-btn {
      width: 100%;
      justify-content: flex-start;
    }
  }

  .topbar {
    padding: 13px 24px;
    border-bottom: 0.5px solid var(--border);
    font-size: 16px;
    font-weight: 500;
    color: var(--text-primary);
    background: var(--main-bg);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .topbar-left {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
  }

  .sidebar-toggle {
    width: 30px;
    height: 30px;
    border: 0.5px solid rgba(0,0,0,0.14);
    border-radius: 8px;
    background: #fff;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--text-muted);
    transition: background 0.12s ease, border-color 0.12s ease;
  }
  .sidebar-toggle:hover {
    background: #F3F0EB;
    border-color: rgba(0,0,0,0.22);
  }

  .desktop-only { display: inline-flex; }
  .mobile-only { display: none; }

  .sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.32);
    z-index: 4;
  }

  .topbar-orb {
    width: 18px; height: 18px;
    border-radius: 50%;
    background: linear-gradient(135deg, #D4730A 0%, #C85B8A 100%);
  }

  /* ── Messages ── */
  .messages {
    flex: 1;
    min-width: 0;
    overflow-x: hidden;
    overflow-y: auto;
    padding: 28px 24px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    scroll-behavior: smooth;
    word-break: break-word;
    overflow-wrap: break-word;
  }

  .msg-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-width: 0;
    width: 100%;
    animation: fadeUp 0.28s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg-sender {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-muted);
  }

  .sender-orb {
    width: 18px; height: 18px;
    border-radius: 50%;
    background: linear-gradient(135deg, #D4730A 0%, #C85B8A 100%);
    flex-shrink: 0;
  }

  .msg-body {
    font-size: 17px;
    line-height: 1.72;
    color: var(--text-primary);
    max-width: 100%;
  }

  /* user bubble */
  .user-row { display: flex; justify-content: flex-end; }
  .user-bubble {
    background: var(--user-bubble);
    border-radius: 18px 18px 4px 18px;
    padding: 10px 16px;
    font-size: 17px;
    line-height: 1.5;
    color: var(--text-primary);
    max-width: 72%;
  }

  /* typing indicator */
  .typing {
    display: flex; align-items: center; gap: 5px;
    padding: 2px 0;
  }
  .typing span {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--text-hint);
    animation: blink 1.3s infinite ease-in-out;
  }
  .typing span:nth-child(2) { animation-delay: 0.18s; }
  .typing span:nth-child(3) { animation-delay: 0.36s; }
  @keyframes blink { 0%,80%,100%{opacity:0.25} 40%{opacity:1} }

  /* ── Tags & pills ── */
  .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }

  .tag {
    display: inline-block;
    font-size: 14px;
    padding: 3px 10px;
    border-radius: 20px;
    background: var(--tag-bg);
    color: var(--text-muted);
  }

  /* ── Main inner (chat + suggestions + composer) ── */
  .main-inner {
    position: relative;
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .main-inner[hidden] {
    display: none !important;
  }

  #suggestions-area {
    display: none;
    flex-direction: column;
    gap: 6px;
    padding: 0;
    flex-shrink: 0;
    width: 100%;
    box-sizing: border-box;
  }

  #suggestions-area.is-visible {
    display: flex;
    padding: 12px 16px 14px;
    background: #1C1C1A;
    border-radius: 16px 16px 0 0;
    border: none;
    border-top: 0.5px solid rgba(255, 255, 255, 0.08);
    box-shadow: none;
    animation: fadeUp 0.22s ease both;
  }

  #suggestions-area.is-visible .suggestions-inner {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  #suggestions-area.is-visible .suggestions-header {
    margin-bottom: 0;
  }

  #suggestions-area.is-hiding {
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s ease;
  }

  .suggestions {
    background: #1C1C1A;
    border-radius: 16px;
    border: 0.5px solid rgba(255, 255, 255, 0.1);
    box-shadow:
      0 8px 32px rgba(0, 0, 0, 0.25),
      0 2px 8px rgba(0, 0, 0, 0.15);
    padding: 16px 18px 14px;
    box-sizing: border-box;
  }

  .suggestions-header {
    font-size: 13px;
    color: rgba(232, 227, 217, 0.6);
    margin-bottom: 12px;
  }

  .suggestions-list {
    display: flex;
    flex-direction: column;
    width: 100%;
    gap: 8px;
    flex-wrap: nowrap;
    overflow-x: visible;
  }

  .suggestion-btn {
    flex-shrink: 0;
    width: 100%;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    border: 0.5px solid rgba(255, 255, 255, 0.1);
    border-radius: 10px;
    background: transparent;
    color: #E8E3D9;
    font-size: 16px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
    text-align: left;
    justify-content: flex-start;
    cursor: pointer;
    transition: background 0.12s ease, border-color 0.12s ease;
    box-sizing: border-box;
  }

  .suggestion-btn:hover {
    background: rgba(255, 255, 255, 0.08);
    border-color: rgba(255, 255, 255, 0.2);
  }

  .suggestion-num {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255, 255, 255, 0.1);
    font-size: 11px;
    font-weight: 500;
    color: rgba(232, 227, 217, 0.8);
  }

  .suggestion-label {
    flex: 1;
    min-width: 0;
  }

  /* ── Case study cards ── */
  .case-cards { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; max-width: 100%; }

  .case-card {
    background: var(--card-bg);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    padding: 13px 16px;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.1s;
  }
  .case-card:hover { border-color: rgba(0,0,0,0.2); transform: translateY(-1px); }
  .case-card:active { transform: scale(0.99); }
  .case-card-title { font-size: 16px; font-weight: 500; color: var(--text-primary); margin-bottom: 4px; }
  .case-card-impact { font-size: 14px; color: #4A7C59; margin-bottom: 7px; }

  /* ── Detail block ── */
  .detail-block {
    background: var(--card-bg);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    max-width: 100%;
    margin-top: 8px;
  }

  .detail-stat {
    display: flex;
    align-items: flex-start;
    gap: 20px;
    margin-bottom: 16px;
    padding-bottom: 14px;
    border-bottom: 0.5px solid var(--border);
  }

  .stat-number { font-size: 31px; font-weight: 500; line-height: 1; color: var(--text-primary); }
  .stat-label { font-size: 13px; color: var(--text-hint); margin-top: 3px; }
  .stat-desc { font-size: 16px; color: var(--text-muted); line-height: 1.55; padding-top: 2px; }

  .detail-row { margin-bottom: 13px; }
  .detail-section-label {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-hint);

  .composer-box {
    display: flex;
    align-items: center;
    gap: 10px;

    border-radius: 24px;
    padding: 10px 10px 10px 18px;

  .composer-placeholder { flex: 1; font-size: 16px; color: var(--text-hint); font-family: 'DM Sans', sans-serif; }
  .composer-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--text-primary);

    display: flex;
    align-items: center;
    justify-content: center;
    cursor: default;
    flex-shrink: 0;

  /* ── Mobile ── */
  @media (max-width: 700px) {
    html, body {
      overflow: auto;
      background: var(--main-bg);

    body {
      display: block;
    }

    body::before {
      display: none;

    .window-wrapper {

    .sidebar {
      position: fixed;

      display: block;

    .topbar {
      padding: 10px 12px;
      font-size: 14px;
      position: sticky;
      top: 0;
      z-index: 3;
    }

    .desktop-only { display: none; }
    .mobile-only { display: inline-flex; }

    .collapsed-rail {
      display: none;
    }

    .topbar-left {
      gap: 8px;
    }

    .sidebar-toggle {
      width: 32px;
      height: 32px;
      border-radius: 9px;
    }

    .topbar-orb {
      width: 16px;
      height: 16px;
    }

    .messages {
      padding: 16px 12px;
      gap: 18px;
    }

    .msg-body,
    .case-cards,
    .detail-block,
    .contact-block {
      max-width: 100%;
    }

    .user-bubble {
      max-width: 88%;
      padding: 10px 14px;
    }

    .detail-block {
      padding: 14px;
    }

    .detail-stat {
      flex-direction: column;

    }

    .composer {

    }
  }
</style>
</head>
<body>

  <!-- Chat area -->
  <main class="main">
    <div class="main-inner" id="main-inner">

            <svg width="15" height="15" viewBox="0 0 15 15" fill="none" aria-hidden="true">
              <path d="M1.5 3C1.5 2.172 2.172 1.5 3 1.5H5.5V13.5H3C2.172 13.5 1.5 12.828 1.5 12V3Z" fill="currentColor" fill-opacity="0.45"/>
              <rect x="1.5" y="1.5" width="12" height="12" rx="1.5" stroke="currentColor" stroke-width="1.15"/>

<script>
const messages = document.getElementById('messages');
const suggestionsEl = document.getElementById('suggestions-area');
const composerEl = document.getElementById('composer');
const mainInner = document.getElementById('main-inner');
const caseViewEl = document.getElementById('case-view');
const cvContentEl = document.getElementById('cv-content');
const cvFooterEl = document.getElementById('cv-footer');
const cvTitleEl = document.getElementById('cv-title');
let suggestionsHideTimer = null;
let currentCaseId = null;

function clearSuggestionsImmediate() {
  if (suggestionsHideTimer) {
    clearTimeout(suggestionsHideTimer);
    suggestionsHideTimer = null;
  }
  suggestionsEl.classList.remove('is-visible', 'is-hiding');
  suggestionsEl.innerHTML = '';
  composerEl.classList.remove('composer-hidden');
}

function buildCvOverviewHtml(c) {
  return `
    <div class="cv-stat-row">
      <div>
        <div class="cv-stat-num">${c.stat}</div>
        <div class="cv-stat-label">${c.statLabel}</div>
      </div>
      <div class="cv-stat-desc">${c.action}</div>
    </div>
    <div class="cv-section">
      <div class="cv-section-label">Problem</div>
      <div class="cv-section-text">${c.problem}</div>
    </div>
    <div class="cv-section">
      <div class="cv-section-label">Team & Timeline</div>
      <div class="cv-section-text">${c.team} · ${c.timeline}</div>
    </div>
    <div class="cv-section">
      <div class="cv-section-label">Key Insights</div>
      <div class="cv-section-text"><ul>${c.insights.map(i => `<li>${i}</li>`).join('')}</ul></div>
    </div>
    <div class="cv-section">
      <div class="cv-section-label">Decisions</div>
      <div class="cv-section-text"><ul>${c.decisions.map(d => `<li>${d}</li>`).join('')}</ul></div>
    </div>
    <div class="cv-section">
      <div class="cv-section-label">Reflection</div>
      <div class="cv-section-text">${c.reflection}</div>
    </div>`;
}

function renderCaseViewTab(tab) {
  if (!currentCaseId) return;
  const c = caseData[currentCaseId];
  if (!c) return;
  if (tab === 'overview') {
    cvContentEl.innerHTML = buildCvOverviewHtml(c);
  } else if (tab === 'screens') {
    cvContentEl.innerHTML = `
      <div class="cv-section-label"
           style="font-size:11px; font-weight:500;
                  color:var(--text-hint); text-transform:uppercase;
                  letter-spacing:0.07em;">
        Screens
      </div>
      <div class="cv-placeholder cv-hero">[ Drop hero screen here ]</div>
      <div class="cv-thumbs">
        <div class="cv-placeholder"></div>
        <div class="cv-placeholder"></div>
        <div class="cv-placeholder"></div>
      </div>
      <div class="cv-section-label"
           style="font-size:11px; font-weight:500;
                  color:var(--text-hint); text-transform:uppercase;
                  letter-spacing:0.07em; margin-top: 16px;">
        Flow
      </div>
      <div class="cv-placeholder cv-flow-large">
        [ User flow diagram ]
      </div>`;
  }
}

function setCvTab(tab) {
  document.querySelectorAll('.cv-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.cvTab === tab);
  });
  renderCaseViewTab(tab);
  cvContentEl.scrollTop = 0;
}

function populateCaseFooter(activeId) {
  const others = Object.entries(caseData)
    .filter(([id]) => id !== activeId)
    .map(([id, c2]) => ({ id, title: c2.title }));
  const btns = others.map(
    ({ id, title }) =>
      `<button type="button" class="cv-footer-btn" data-case-id="${id}">${title}</button>`
  ).join('');
  cvFooterEl.innerHTML = `
    <div class="cv-footer-inner">
      <span class="cv-footer-label">More work</span>
      <div class="cv-footer-links">${btns}</div>
    </div>`;
  cvFooterEl.querySelectorAll('[data-case-id]').forEach(btn => {
    btn.addEventListener('click', () => openCaseView(btn.getAttribute('data-case-id')));
  });
}

function openCaseView(id) {
  const c = caseData[id];
  if (!c) return;
  viewedCases.add(id);
  currentCaseId = id;
  cvTitleEl.textContent = c.title;
  populateCaseFooter(id);
  setCvTab('overview');
  caseViewEl.hidden = false;
  mainInner.hidden = true;
  cvContentEl.scrollTop = 0;
}

function closeCaseView() {
  currentCaseId = null;
  caseViewEl.hidden = true;
  mainInner.hidden = false;
  cvFooterEl.innerHTML = '';
}

document.getElementById('cv-back').addEventListener('click', () => closeCaseView());

document.querySelectorAll('.cv-tab').forEach(btn => {
  btn.addEventListener('click', () => setCvTab(btn.dataset.cvTab));
});

const caseData = {
  'sports-tracker': {
    title: 'Sports Tracker',
    impact: '90% of AFL bettors used the tracker',
    type: 'Feature', platform: 'Web & Native',
    stat: '90%', statLabel: 'AFL bettors engaged',
    action: 'Introduced an in-app bet tracker with live game context.',
    problem: '69% of users were using external apps to track their bets.',
    team: 'Sports Betting Product', timeline: '4 weeks',
    insights: ['Users needed real-time clarity, not just final outcomes','Trust in data accuracy was low','Lack of context created confusion around results'],
    decisions: ['Added contextual signals (substitutions, player status)','Simplified win/loss clarity','Introduced visible refresh state to communicate data latency'],
    reflection: 'Real-time expectations will continue to increase. Passive tracking (e.g. lock screen) is a strong opportunity for the next iteration.'
  },
  'feed-profile': {
    title: 'Feed Profile Creation',
    impact: '100% task completion in usability testing',
    type: 'Growth / Onboarding', platform: 'Native',
    stat: '100%', statLabel: 'task completion in testing',
    action: 'Fast-tracked profile creation flow for non-logged-in users.',
    problem: 'Only 3 out of 10 users interacting with the Feed created an account.',
    team: 'Customer to Customer', timeline: '2 weeks',
    insights: ['Registration and Feed systems were handled separately','Users were hesitant to commit to a full sign-up flow','High drop-off before any account creation occurred'],
    decisions: ['Bottom sheet with auto-generated name and avatar','Option to edit or regenerate identity','Added reassurance messaging to reduce hesitation','Reduced total steps in profile creation flow'],
    reflection: 'Earlier integration into the registration flow could further improve conversion. Opportunity to personalise identity earlier in the journey.'
  },
  'wayfinding': {
    title: 'Wayfinding in Landscape',
    impact: 'Improved in-drive usability and spatial clarity',
    type: 'UX / System redesign', platform: 'Native / CarPlay',
    stat: '↑', statLabel: 'spatial clarity & reachability',
    action: 'Redesigned navigation and layout for landscape and in-car use.',
    problem: 'No dedicated landscape experience despite majority usage occurring while driving.',
    team: 'Newtracs', timeline: '4 weeks',
    insights: ['Speed, location, altitude needed persistent, anchored visibility','Primary actions needed right-edge placement for thumb reach','Bottom nav fails completely in landscape orientation'],
    decisions: ['Persistent real-time info anchored in consistent position','Primary actions moved to right edge for accessibility','Replaced bottom nav with a right-side drawer','Record function elevated as a floating action'],
    reflection: 'Further validation needed on navigation clarity across different user types. Continued iteration on information density based on behaviour.'
  },
  'world-cup': {
    title: 'World Cup Knockout',
    impact: 'New interaction model for event-based engagement',
    type: 'Feature', platform: 'Native',
    stat: 'New', statLabel: 'interaction model shipped',
    action: 'Designed an event-driven engagement surface for knockout stages.',
    problem: 'No dedicated experience to capture the energy of knockout tournament moments.',
    team: 'Sports Product', timeline: '3 weeks',
    insights: ['Knockout moments drive peak user intent','Standard bet flow doesn\'t match tournament energy','Users want contextual, moment-specific experiences'],
    decisions: ['Bracket-style visual layout to mirror the tournament format','Progressive reveal as matches resolved','Contextual content tied to live match events'],
    reflection: 'The template can extend to other tournament formats across the platform in future seasons.'
  }
};

// State
let currentSection = 'intro';
const viewedCases = new Set();
const windowWrapper = document.querySelector('.window-wrapper');
const mobileQuery = window.matchMedia('(max-width: 700px)');

function setActiveNav(key) {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.rail-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('nav-' + key);
  const rail = document.getElementById('rail-' + key);
  if (el) el.classList.add('active');
  if (rail) rail.classList.add('active');
}

function navClick(key) {
  removeOptions();
  closeSidebarOnMobile();
  if (key === 'intro') { resetChat(); return; }
  if (key === 'case-studies') { handleOption('case-studies'); return; }
  if (key === 'playground') { handleOption('playground'); return; }
  if (key === 'contact') { handleOption('contact'); return; }
}

function toggleDesktopSidebar() {
  if (mobileQuery.matches) return;
  windowWrapper.classList.toggle('sidebar-collapsed');
}

function toggleMobileSidebar() {
  if (!mobileQuery.matches) return;
  windowWrapper.classList.toggle('sidebar-open');
}

function closeSidebarOnMobile() {
  if (!mobileQuery.matches) return;
  windowWrapper.classList.remove('sidebar-open');
}

mobileQuery.addEventListener('change', e => {
  if (!e.matches) {
    windowWrapper.classList.remove('sidebar-open');
  }
});

function resetChat() {
  removeOptions();
  closeCaseView();
  viewedCases.clear();
  messages.innerHTML = '';
  currentSection = 'intro';
  setActiveNav('intro');
  init();
}

// ── DOM helpers ──

function addUserMsg(text) {
  const g = document.createElement('div');
  g.className = 'msg-group';
  g.innerHTML = `<div class="user-row"><div class="user-bubble">${text}</div></div>`;
  messages.appendChild(g);
  scroll();
}

function addTyping() {
  const g = document.createElement('div');
  g.className = 'msg-group';
  g.id = 'typing';
  g.innerHTML = `
    <div class="msg-sender"><div class="sender-orb"></div> Quynh</div>
    <div class="typing"><span></span><span></span><span></span></div>`;
  messages.appendChild(g);
  scroll();
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

function addClaudeMsg(html) {
  const g = document.createElement('div');
  g.className = 'msg-group';
  g.innerHTML = `
    <div class="msg-sender"><div class="sender-orb"></div> Quynh</div>
    <div class="msg-body">${html}</div>`;
  messages.appendChild(g);
  scroll();
}

function addOptions(pills, headerText) {
  clearSuggestionsImmediate();
  const header = headerText === undefined || headerText === null ? 'Suggested' : headerText;
  const headerHtml = `<div class="suggestions-header">${header.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</div>`;
  const buttonsHtml = pills.map((p, i) =>
    `<button type="button" class="suggestion-btn" onclick="handleOption('${p.key}')"><span class="suggestion-num" aria-hidden="true">${i + 1}</span><span class="suggestion-label">${p.label}</span></button>`
  ).join('');
  suggestionsEl.innerHTML = `<div class="suggestions-inner">${headerHtml}<div class="suggestions-list">${buttonsHtml}</div></div>`;
  suggestionsEl.classList.add('is-visible');
  composerEl.classList.add('composer-hidden');
  scroll();
}

function removeOptions() {
  const o = document.getElementById('options');
  if (o) o.remove();
  if (!suggestionsEl.classList.contains('is-visible') || !suggestionsEl.innerHTML.trim()) {
    clearSuggestionsImmediate();
    return;
  }
  if (suggestionsHideTimer) {
    clearTimeout(suggestionsHideTimer);
    suggestionsHideTimer = null;
  }
  suggestionsEl.classList.add('is-hiding');
  suggestionsHideTimer = setTimeout(() => {
    suggestionsEl.innerHTML = '';
    suggestionsEl.classList.remove('is-visible', 'is-hiding');
    composerEl.classList.remove('composer-hidden');
    suggestionsHideTimer = null;
  }, 200);
}

function scroll() {
  setTimeout(() => { messages.scrollTop = messages.scrollHeight; }, 50);
}

// ── Interaction handlers ──

function handleOption(key) {
  removeOptions();

  if (key === 'case-studies') {
    closeCaseView();
    setActiveNav('case-studies');
    addUserMsg('Show me your case studies');
    addTyping();
    setTimeout(() => {
      removeTyping();
      const cards = Object.entries(caseData).map(([id, c]) => `
        <div class="case-card" onclick="handleOption('case-${id}')">
          <div class="case-card-title">${c.title}</div>
          <div class="case-card-impact">↑ ${c.impact}</div>
          <span class="tag">${c.type}</span> <span class="tag">${c.platform}</span>
        </div>`).join('');
      addClaudeMsg(`Here's a summary of my recent work. Click any project to go deeper.<div class="case-cards">${cards}</div>`);
    }, 900);

  } else if (key.startsWith('case-')) {
    const id = key.replace('case-', '');
    const c = caseData[id];
    if (!c) {
      closeCaseView();
      return;
    }
    setActiveNav('case-studies');
    addUserMsg(`Walk me through ${c.title}`);
    addTyping();
    setTimeout(() => {
      removeTyping();
      addClaudeMsg(`Here's the quick version of <strong>${c.title}</strong> — the full story is in the panel.
      <ul style="margin-top: 10px; padding-left: 18px; display: flex; flex-direction: column; gap: 6px;">
